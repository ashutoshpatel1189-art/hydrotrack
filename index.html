<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HydroTrack Pro</title>
	<style>
	*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: linear-gradient(180deg,#eaf7e3,#d8f0ce);
    padding:30px;
    display:flex;
    justify-content:center;
}

.app{
    width:420px;
    background:#f9fff7;
    border-radius:30px;
    padding:24px;
    box-shadow:0 20px 60px rgba(0,0,0,0.15);
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header h1{
    color:#2e7d32;
}

.header p{
    color:#666;
    font-size:14px;
}

#darkToggle{
    border:none;
    padding:12px;
    border-radius:50%;
    cursor:pointer;
}

.goal-box{
    margin-top:20px;
    background:white;
    padding:18px;
    border-radius:20px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.goal-input{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.goal-input input{
    flex:1;
    padding:12px;
    border-radius:12px;
    border:1px solid #ccc;
}

.goal-input button{
    padding:12px 18px;
    background:#2e7d32;
    color:white;
    border:none;
    border-radius:12px;
}

.hero{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:25px;
}

.progress-left h2{
    color:#2e7d32;
}

.progress-left h3{
    font-size:48px;
    color:#1b5e20;
}

.progress-circle{
    position:relative;
}

.percentage{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    font-weight:bold;
}

.bg-circle{
    fill:none;
    stroke:#dcefd3;
    stroke-width:12;
}

.progress-ring{
    fill:none;
    stroke:#2e7d32;
    stroke-width:12;
    stroke-linecap:round;
    stroke-dasharray:408;
    stroke-dashoffset:408;
    transform:rotate(-90deg);
    transform-origin:center;
}

.bottle-section{
    display:flex;
    justify-content:center;
    margin-top:25px;
}

.bottle{
    width:120px;
    height:260px;
    border:5px solid #2e7d32;
    border-radius:40px 40px 20px 20px;
    position:relative;
    overflow:hidden;
    background:white;
}

.water-level{
    position:absolute;
    bottom:0;
    width:100%;
    height:0%;
    background:linear-gradient(#81c784,#43a047);
    transition:0.6s;
}

.stats-grid{
    margin-top:25px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.card{
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

.card h4{
    color:#666;
}

.card p{
    font-size:28px;
    font-weight:bold;
    margin-top:10px;
    color:#2e7d32;
}

.quick-buttons{
    margin-top:15px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.quick-buttons button{
    padding:15px;
    border:none;
    border-radius:16px;
    background:white;
    box-shadow:0 5px 12px rgba(0,0,0,0.08);
    cursor:pointer;
}

.quick-buttons button:hover{
    background:#2e7d32;
    color:white;
}

.actions{
    margin-top:25px;
    display:flex;
    gap:15px;
}

.actions button{
    flex:1;
    padding:18px;
    border:none;
    border-radius:18px;
    font-size:18px;
    cursor:pointer;
}

.add-btn{
    background:#2e7d32;
    color:white;
}

.reset-btn{
    background:white;
}

.reminder-card,
.chart-card,
.quote-box{
    margin-top:25px;
    background:white;
    padding:20px;
    border-radius:22px;
    box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

.chart{
    display:flex;
    align-items:end;
    gap:10px;
    height:120px;
    margin-top:20px;
}

.bar{
    width:30px;
    background:linear-gradient(#a5d6a7,#2e7d32);
    border-radius:10px;
}

.switch{
    display:inline-block;
    margin-top:12px;
}

.slider{
    display:block;
    width:60px;
    height:30px;
    background:#ccc;
    border-radius:30px;
}
	</style>
</head>
<body>

<div class="app">

    <!-- Header -->
    <header class="header">
        <div>
            <h1>💧 HydroTrack</h1>
            <p>Stay hydrated, stay healthy</p>
        </div>
        <button id="darkToggle">🌙</button>
    </header>

    <!-- Goal Section -->
    <section class="goal-box">
        <label>Daily Goal (Liters)</label>
        <div class="goal-input">
            <input type="number" id="goalInput" value="5">
            <button id="saveGoal">Save</button>
        </div>
    </section>

    <!-- Hero Section -->
    <section class="hero">

        <div class="progress-left">
            <h2>Today's Progress</h2>
            <h3><span id="currentWater">0</span> L</h3>
            <p>of <span id="goalText">5</span> L daily goal</p>
        </div>

        <div class="progress-circle">
            <svg width="160" height="160">
                <circle cx="80" cy="80" r="65" class="bg-circle"/>
                <circle cx="80" cy="80" r="65" class="progress-ring" id="ring"/>
            </svg>
            <div class="percentage" id="percent">0%</div>
        </div>

    </section>

    <!-- Bottle Hero -->
    <section class="bottle-section">
        <div class="bottle">
            <div class="water-level" id="waterLevel"></div>
        </div>
    </section>

    <!-- Stats -->
    <section class="stats-grid">

        <div class="card">
            <h4>Remaining</h4>
            <p id="remaining">5 L</p>
        </div>

        <div class="card">
            <h4>Goal</h4>
            <p id="goalDisplay">5 L</p>
        </div>

        <div class="card">
            <h4>Next Target</h4>
            <p>500 ml</p>
        </div>

        <div class="card">
            <h4>Progress</h4>
            <p id="progressPercent">0%</p>
        </div>

    </section>

    <!-- Quick Add -->
    <section>
        <h3>Quick Add</h3>

        <div class="quick-buttons">
            <button onclick="addWater(250)">250 ml</button>
            <button onclick="addWater(500)">500 ml</button>
            <button onclick="addWater(750)">750 ml</button>
            <button onclick="addWater(1000)">1 L</button>
        </div>
    </section>

    <!-- Action Buttons -->
    <section class="actions">
        <button class="add-btn" onclick="addWater(500)">Add Water</button>
        <button class="reset-btn" onclick="resetWater()">Reset Day</button>
    </section>

    <!-- Reminder -->
    <section class="reminder-card">
        <h3>Reminder</h3>
        <p>Next Reminder: 8:00 PM</p>
        <label class="switch">
            <input type="checkbox" id="reminderToggle">
            <span class="slider"></span>
        </label>
    </section>

    <!-- Weekly Chart -->
    <section class="chart-card">
        <h3>Weekly Progress</h3>

        <div class="chart">
            <div class="bar" style="height:40%"></div>
            <div class="bar" style="height:60%"></div>
            <div class="bar" style="height:85%"></div>
            <div class="bar" style="height:50%"></div>
            <div class="bar" style="height:90%"></div>
            <div class="bar" style="height:75%"></div>
            <div class="bar" style="height:95%"></div>
        </div>
    </section>

    <!-- Quote -->
    <section class="quote-box">
        <p id="quote">Drink water. Your body will thank you 💚</p>
    </section>

</div>

<script>
let goal = Number(localStorage.getItem("goal")) || 5; // liters
let water = Number(localStorage.getItem("water")) || 0; // ml

const quotes = [
    "Drink water. Your body will thank you 💚",
    "Small sips, big health gains 🌿",
    "Hydration improves focus ⚡",
    "Water = Energy + Clear skin ✨"
];

const goalInput = document.getElementById("goalInput");
const goalText = document.getElementById("goalText");
const goalDisplay = document.getElementById("goalDisplay");
const currentWater = document.getElementById("currentWater");
const remaining = document.getElementById("remaining");
const percent = document.getElementById("percent");
const progressPercent = document.getElementById("progressPercent");
const waterLevel = document.getElementById("waterLevel");
const ring = document.getElementById("ring");
const quote = document.getElementById("quote");
const darkToggle = document.getElementById("darkToggle");

goalInput.value = goal;

function updateUI() {
    const goalMl = goal * 1000;
    const percentage = Math.min(Math.round((water / goalMl) * 100), 100);

    currentWater.textContent = (water / 1000).toFixed(1);
    goalText.textContent = goal;
    goalDisplay.textContent = goal + " L";

    remaining.textContent =
        Math.max(((goalMl - water) / 1000), 0).toFixed(1) + " L";

    percent.textContent = percentage + "%";
    progressPercent.textContent = percentage + "%";

    // bottle fill
    waterLevel.style.height = percentage + "%";

    // circle animation
    const circumference = 408;
    const offset = circumference - (percentage / 100) * circumference;
    ring.style.strokeDashoffset = offset;

    localStorage.setItem("goal", goal);
    localStorage.setItem("water", water);
}

function addWater(amount) {
    water += amount;
    updateUI();
}

function resetWater() {
    water = 0;
    updateUI();
}

document.getElementById("saveGoal").addEventListener("click", () => {
    goal = Number(goalInput.value);

    if (goal <= 0) {
        alert("Goal must be greater than 0");
        return;
    }

    updateUI();
});

darkToggle.addEventListener("click", () => {
    document.body.classList.toggle("dark-mode");
});

setInterval(() => {
    quote.textContent = quotes[Math.floor(Math.random() * quotes.length)];
}, 5000);

updateUI();
</script>
</body>
</html>
